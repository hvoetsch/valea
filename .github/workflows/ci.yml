name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.toml') }}

      - name: Build
        run: cargo build --release

      - name: Run tests
        run: cargo test

  fmt-check:
    name: Example Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build compiler
        run: cargo build --release

      - name: Check all examples are canonically formatted
        run: |
          for f in examples/*.va; do
            echo "Checking $f ..."
            ./target/release/valea fmt --check "$f"
          done
